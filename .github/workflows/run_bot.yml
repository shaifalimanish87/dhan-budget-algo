name: Run Trading Bot Daily

on:
  schedule:
    - cron: '*/10 4-10 * * 1-5' # Every 10 mins during market hours
  workflow_dispatch: # Manual run button
  repository_dispatch:
    types: [auto_trigger]

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Libraries Direct
      run: |
        python -m pip install --upgrade pip
        pip install yfinance pandas ta pytz requests
        
    - name: Run Script
      run: python -u Parshwa87bot.py
