name: Run Trading Bot Daily

on:
  schedule:
    - cron: '*/10 4-10 * * 1-5' # Market hours (IST 9:30-3:30 approx)
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    # Node 24 standard compatibility ke liye explicit major version upgrade
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    # Node 24 supporting runner configuration
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' # Automated runner dependency optimization

    # Dependencies install karein bina deprecation conflict ke
    - name: Install Libraries
      run: |
        python -m pip install --upgrade pip
        pip install dhanhq pandas ta pytz requests

    - name: Run Script
      env:
        DHAN_CLIENT_ID: ${{ secrets.DHAN_CLIENT_ID }}
        DHAN_ACCESS_TOKEN: ${{ secrets.DHAN_ACCESS_TOKEN }}
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python -u Parshwa87bot.py
