name: Run Trading Bot Daily

on:
  schedule:
    - cron: '*/10 4-10 * * 1-5' # Market hours (IST 9:30-3:30 approx)
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    # 1. Repository code ko checkout karna (Clean execution)
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Python environment setup bina kisi cache conflict ke
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. Direct libraries installation
    - name: Install Libraries
      run: |
        python -m pip install --upgrade pip
        pip install dhanhq pandas ta pytz requests

    # 4. Main script ko real-time data ke sath run karna
    - name: Run Script
      env:
        DHAN_CLIENT_ID: ${{ secrets.DHAN_CLIENT_ID }}
        DHAN_ACCESS_TOKEN: ${{ secrets.DHAN_ACCESS_TOKEN }}
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python -u Parshwa87bot.py
