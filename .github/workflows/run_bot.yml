name: Run Trading Bot Daily

on:
  schedule:
    - cron: '*/10 4-10 * * 1-5' # Market hours (IST 9:30-3:30 approx)
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    # Changed from v4 to latest v4 patch/v5 compatibility for Node 24 support
    - name: Checkout Code
      uses: actions/checkout@v4.2.2 

    # Changed from v5 to latest v5 patch for updated runner compatibility
    - name: Setup Python
      uses: actions/setup-python@v5.3.0
      with:
        python-version: '3.10'

    - name: Install Libraries
      run: |
        python -m pip install --upgrade pip
        pip install dhanhq pandas ta pytz requests

    - name: Run Script
      env:
        DHAN_CLIENT_ID: ${{ secrets.DHAN_CLIENT_ID }}
        DHAN_ACCESS_TOKEN: ${{ secrets.DHAN_ACCESS_TOKEN }}
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python -u Parshwa87bot.py
